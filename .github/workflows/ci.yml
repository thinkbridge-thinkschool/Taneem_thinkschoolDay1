name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore QuotesApi.slnx
      - name: Build
        run: dotnet build QuotesApi.slnx --no-restore
      - name: Test
        run: dotnet test QuotesApi.slnx --no-build --verbosity normal