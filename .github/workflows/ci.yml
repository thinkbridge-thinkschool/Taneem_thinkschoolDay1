name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore QuotesApi.slnx
      - name: Build QuotesApi
        run: dotnet build QuotesApi.csproj --no-restore
      - name: Build tests
        run: dotnet build tests/tests.csproj --no-restore
      - name: Build Tests.Domain
        run: dotnet build Tests.Domain/Tests.Domain.csproj --no-restore
      - name: Restore integration tests
        run: dotnet restore Quotes.Tests.Integration/Quotes.Tests.Integration.csproj
      - name: Build integration tests
        run: dotnet build Quotes.Tests.Integration/Quotes.Tests.Integration.csproj --no-restore
      - name: Run tests
        run: |
          dotnet test tests/tests.csproj --no-build --verbosity normal
          dotnet test Tests.Domain/Tests.Domain.csproj --no-build --verbosity normal
          dotnet test Quotes.Tests.Integration/Quotes.Tests.Integration.csproj --no-build --verbosity normal